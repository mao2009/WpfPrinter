name: CI & NuGet Upload

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        include-prerelease: false

    - name: Restore dependencies
      run: dotnet restore WpfPrinter.sln

    - name: Build
      run: dotnet build WpfPrinter.sln --no-restore

    - name: Test
      run: dotnet test WpfPrinter.sln --no-build --verbosity normal

    - name: Pack NuGet package
      run: dotnet pack WpfPrinter/WpfPrinter.csproj --configuration Release -o out --no-build

    - name: Push NuGet package
      if: startsWith(github.ref, 'refs/tags/v')
      run: dotnet nuget push "out/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --no-symbols --skip-duplicate
