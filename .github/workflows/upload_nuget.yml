name: CI/CD

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        include-prerelease: false

    - name: Restore dependencies
      run: dotnet restore WpfPrinter.sln

    - name: Build
      run: dotnet build WpfPrinter.sln --no-restore

    - name: Test
      run: dotnet test WpfPrinter.sln --no-build --verbosity normal

  publish:
    needs: build-and-test
    runs-on: windows-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        include-prerelease: false
        source-url: https://api.nuget.org/v3/index.json

    - name: Pack the project
      run: dotnet pack WpfPrinter/WpfPrinter.csproj --configuration Release --output ./artifacts

    - name: Publish to NuGet
      run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
